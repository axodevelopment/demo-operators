# This rule is not used by the project demo-operators itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the workshop.workshop.io.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: demo-operators
    app.kubernetes.io/managed-by: kustomize
  name: paychex-editor-role
rules:
- apiGroups:
  - workshop.workshop.io
  resources:
  - paychexes
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - workshop.workshop.io
  resources:
  - paychexes/status
  verbs:
  - get
