---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - workshop.workshop.io
  resources:
  - paychexes
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - workshop.workshop.io
  resources:
  - paychexes/finalizers
  verbs:
  - update
- apiGroups:
  - workshop.workshop.io
  resources:
  - paychexes/status
  verbs:
  - get
  - patch
  - update
